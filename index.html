<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>עברית Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Serif+Hebrew:wght@300;400;600&display=swap');

:root {
–bg: #0a0a0a; –surface: #111111; –surface2: #1a1a1a;
–border: #222222; –accent: #1DB954; –text: #ffffff;
–muted: #888888; –muted2: #555555;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(–bg); color:var(–text); font-family:‘Syne’,sans-serif; overflow:hidden; }

#setupScreen {
position:fixed; inset:0; background:var(–bg);
display:flex; flex-direction:column; align-items:center; justify-content:center;
padding:32px 24px; z-index:1000;
}
.setup-logo { font-family:‘Noto Serif Hebrew’,serif; font-size:56px; color:var(–accent); margin-bottom:8px; }
.setup-title { font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(–muted); margin-bottom:40px; }
.setup-card { width:100%; max-width:400px; background:var(–surface); border:1px solid var(–border); border-radius:12px; padding:28px; }
.setup-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(–muted); margin-bottom:12px; }
.setup-row { display:flex; gap:8px; margin-bottom:16px; }
.setup-input { flex:1; background:var(–bg); border:1px solid var(–border); border-radius:8px; color:var(–text); font-family:‘Syne’,sans-serif; font-size:13px; padding:12px 14px; outline:none; }
.setup-input:focus { border-color:var(–accent); }
.setup-toggle { background:var(–bg); border:1px solid var(–border); border-radius:8px; color:var(–muted); font-size:16px; padding:12px; cursor:pointer; }
.setup-btn { width:100%; background:var(–accent); border:none; border-radius:50px; color:#000; font-family:‘Syne’,sans-serif; font-size:14px; font-weight:700; padding:16px; cursor:pointer; margin-top:8px; }
.setup-note { display:flex; gap:8px; margin-top:14px; padding:12px; background:#0d1a11; border:1px solid #1a3025; border-radius:8px; }
.setup-note span { font-size:11px; color:#6aaa7a; line-height:1.5; }
.setup-error { font-size:12px; color:#ff6b6b; margin-top:8px; display:none; }

#app { display:none; flex-direction:column; height:100vh; height:100dvh; }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 8px; flex-shrink:0; }
.topbar-logo { font-family:‘Noto Serif Hebrew’,serif; font-size:24px; color:var(–accent); }
.shuffle-btn { background:none; border:1px solid var(–border); border-radius:20px; color:var(–muted); font-family:‘Syne’,sans-serif; font-size:12px; padding:6px 14px; cursor:pointer; transition:all 0.2s; }
.shuffle-btn.active { border-color:var(–accent); color:var(–accent); background:#0d2018; }

.artwork-wrap { padding:0 20px 12px; flex-shrink:0; }
.artwork { width:100%; aspect-ratio:1; max-height:200px; border-radius:12px; overflow:hidden; position:relative; background:var(–surface2); }
.artwork-canvas { width:100%; height:100%; display:block; }
.artwork-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.artwork-hebrew { font-family:‘Noto Serif Hebrew’,serif; font-size:clamp(28px,9vw,52px); color:white; text-shadow:0 2px 20px rgba(0,0,0,0.8); direction:rtl; text-align:center; line-height:1.2; }
.artwork-phonetic { font-size:clamp(12px,3vw,15px); color:rgba(255,255,255,0.65); text-align:center; margin-top:6px; letter-spacing:1px; }

.track-info { padding:0 20px 4px; flex-shrink:0; display:flex; justify-content:space-between; align-items:flex-start; }
.track-left .track-hebrew { font-family:‘Noto Serif Hebrew’,serif; font-size:20px; direction:rtl; }
.track-left .track-french { font-size:13px; color:var(–muted); margin-top:2px; }
.track-num { font-size:12px; color:var(–muted2); }

.progress-wrap { padding:8px 20px; flex-shrink:0; }
.progress-bg { height:3px; background:var(–border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(–accent); width:0%; transition:width 0.4s; border-radius:2px; }

.status { font-size:11px; color:var(–muted); text-align:center; padding:2px 20px 4px; flex-shrink:0; min-height:18px; }
.status.ok { color:var(–accent); }
.status.err { color:#ff6b6b; }

.controls { display:flex; align-items:center; justify-content:center; gap:28px; padding:4px 20px 12px; flex-shrink:0; }
.ctrl { background:none; border:none; color:var(–muted); font-size:22px; cursor:pointer; padding:8px; border-radius:50%; transition:all 0.15s; }
.ctrl:hover { color:var(–text); }
.play-btn { width:60px; height:60px; background:var(–text); border-radius:50%; color:#000; font-size:24px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; border:none; cursor:pointer; }
.play-btn.loading { background:var(–accent); }

.playlist-header { display:flex; align-items:center; justify-content:space-between; padding:8px 20px; border-top:1px solid var(–border); flex-shrink:0; }
.playlist-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(–muted); }
.search { background:var(–surface2); border:1px solid var(–border); border-radius:20px; color:var(–text); font-family:‘Syne’,sans-serif; font-size:12px; padding:5px 12px; outline:none; width:110px; transition:all 0.2s; }
.search:focus { border-color:var(–accent); width:140px; }

.playlist { flex:1; overflow-y:auto; padding:0 12px 20px; -webkit-overflow-scrolling:touch; }
.playlist::-webkit-scrollbar { width:3px; }
.playlist::-webkit-scrollbar-thumb { background:var(–border); border-radius:2px; }

.pitem { display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer; transition:background 0.15s; }
.pitem:hover { background:var(–surface2); }
.pitem.active { background:#0d2018; }
.pitem-num { font-size:11px; color:var(–muted2); width:22px; text-align:center; flex-shrink:0; }
.pitem.active .pitem-num { color:var(–accent); }
.pitem-dot { width:30px; height:30px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:‘Noto Serif Hebrew’,serif; font-size:13px; color:white; }
.pitem-info { flex:1; min-width:0; }
.pitem-heb { font-family:‘Noto Serif Hebrew’,serif; font-size:14px; direction:rtl; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pitem.active .pitem-heb { color:var(–accent); }
.pitem-fr { font-size:11px; color:var(–muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>

</head>
<body>

<audio id="player" playsinline></audio>
<audio id="bgMusic" playsinline loop src="https://cdn.pixabay.com/audio/2022/10/16/audio_a794a57e15.mp3"></audio>

<div id="setupScreen">
  <div class="setup-logo">עברית</div>
  <div class="setup-title">Hebrew Player</div>
  <div class="setup-card">
    <div class="setup-label">Clé API Google Cloud TTS</div>
    <div class="setup-row">
      <input class="setup-input" type="password" id="apiKey" placeholder="AIza...">
      <button class="setup-toggle" onclick="toggleKey()">👁</button>
    </div>
    <div class="setup-note">
      <span>🔒 Ta clé reste dans ton navigateur — jamais envoyée ailleurs qu'à Google TTS.</span>
    </div>
    <div class="setup-error" id="setupErr"></div>
    <button class="setup-btn" onclick="startApp()">Ouvrir ma playlist →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">עברית</div>
    <div style="display:flex;gap:8px;align-items:center"><button class="shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()">⇄ Aléatoire</button><button class="shuffle-btn" id="musicBtn" onclick="toggleMusic()" style="font-size:16px;padding:6px 10px">🎵</button><input type="range" id="volSlider" min="0" max="100" value="20" oninput="setVol(this.value)" style="width:60px;accent-color:var(--accent);display:none" id="volSlider"></div>
  </div>

  <div class="artwork-wrap">
    <div class="artwork">
      <canvas class="artwork-canvas" id="canvas"></canvas>
      <div class="artwork-overlay">
        <div class="artwork-hebrew" id="awHeb">—</div>
        <div class="artwork-phonetic" id="awPho"></div>
      </div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-left">
      <div class="track-hebrew" id="tHeb">Prêt</div>
      <div class="track-french" id="tFr">Appuie sur ▶ pour commencer</div>
    </div>
    <div class="track-num" id="tNum"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bg"><div class="progress-fill" id="prog"></div></div>
  </div>

  <div class="status" id="status">Sélectionne une carte ou appuie sur ▶</div>

  <div class="controls">
    <button class="ctrl" onclick="doPrev()">⏮</button>
    <button class="play-btn" id="playBtn" onclick="doToggle()">▶</button>
    <button class="ctrl" onclick="doNext()">⏭</button>
  </div>

  <div class="playlist-header">
    <span class="playlist-title">Playlist · 312 cartes</span>
    <input class="search" type="text" placeholder="🔍 Chercher..." oninput="filterList(this.value)">
  </div>
  <div class="playlist" id="playlist"></div>
</div>

const player = document.getElementById('player');
let API_KEY = '';
let queue = [];
let qPos = 0;
let shuffleMode = false;
let isPlaying = false;
let stopFlag = false;

// Sequence steps for one card
const STEPS = ['hebrew', 'silence1', 'french', 'silence2', 'hebrew2', 'silence3'];

// ---- SETUP ----
window.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('hpApiKey');
  if (k) document.getElementById('apiKey').value = k;
});

function toggleKey() {
  const i = document.getElementById('apiKey');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function startApp() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || key.length < 10) {
    document.getElementById('setupErr').textContent = 'Clé invalide.';
    document.getElementById('setupErr').style.display = 'block';
    return;
  }
  API_KEY = key;
  localStorage.setItem('hpApiKey', key);
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  resetQueue();
  buildList();
  showCard(queue[qPos]);
}

// ---- QUEUE ----
function resetQueue() {
  queue = shuffleMode
    ? [...Array(CARDS.length).keys()].sort(() => Math.random() - 0.5)
    : [...Array(CARDS.length).keys()];
}

function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffleMode);
  const wasPlaying = isPlaying;
  hardStop();
  resetQueue();
  qPos = 0;
  buildList();
  showCard(queue[qPos]);
  if (wasPlaying) startPlaying();
}

// ---- ARTWORK ----
function drawArtwork(idx) {
  const cv = document.getElementById('canvas');
  const ctx = cv.getContext('2d');
  const s = cv.offsetWidth;
  cv.width = s; cv.height = s;
  const c = PALETTES[idx % PALETTES.length];
  const g = ctx.createRadialGradient(s*.3,s*.3,0,s*.7,s*.7,s);
  g.addColorStop(0,c[2]); g.addColorStop(.5,c[1]); g.addColorStop(1,c[0]);
  ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
  ctx.globalAlpha = .12; ctx.fillStyle = c[3];
  ctx.beginPath(); ctx.arc(s*.8,s*.2,s*.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*.1,s*.9,s*.3,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function showCard(idx) {
  const card = CARDS[idx];
  document.getElementById('awHeb').textContent = card.hebrew;
  document.getElementById('awPho').textContent = card.phonetic;
  document.getElementById('tHeb').textContent = card.hebrew;
  document.getElementById('tFr').textContent = card.french;
  document.getElementById('tNum').textContent = `${idx+1} / 312`;
  document.getElementById('prog').style.width = `${(qPos/queue.length)*100}%`;
  drawArtwork(idx);
  document.querySelectorAll('.pitem').forEach(e => e.classList.remove('active'));
  const el = document.getElementById(`pi-${idx}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: card.hebrew, artist: card.french, album: 'עברית Player'
    });
  }
}

// ---- TTS FETCH ----
async function fetchTTS(text, lang, voice) {
  const r = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${API_KEY}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      input:{text}, voice:{languageCode:lang, name:voice},
      audioConfig:{audioEncoding:'MP3', speakingRate:1.0}
    })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'TTS Error'); }
  const d = await r.json();
  // Convert base64 to blob URL
  const bin = atob(d.audioContent);
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const blob = new Blob([bytes], {type:'audio/mpeg'});
  return URL.createObjectURL(blob);
}

// ---- PLAY ONE URL ----
function playUrl(url) {
  return new Promise((resolve, reject) => {
    player.src = url;
    player.load();
    player.onended = () => { URL.revokeObjectURL(url); resolve(); };
    player.onerror = () => { URL.revokeObjectURL(url); resolve(); };
    const p = player.play();
    if (p) p.catch(() => resolve());
  });
}

function waitMs(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ---- PLAY ONE CARD ----
async function playCard(cardIdx) {
  if (stopFlag) return;
  const card = CARDS[cardIdx];
  setStatus(`Chargement — ${card.hebrew}...`);
  document.getElementById('playBtn').classList.add('loading');

  let hUrl, fUrl;
  try {
    [hUrl, fUrl] = await Promise.all([
      fetchTTS(card.hebrew, 'he-IL', 'he-IL-Wavenet-D'),
      fetchTTS(card.french, 'fr-FR', 'fr-FR-Wavenet-B')
    ]);
  } catch(e) {
    setStatus('Erreur: ' + e.message, false, true);
    hardStop(); return;
  }

  if (stopFlag) return;
  document.getElementById('playBtn').classList.remove('loading');
  showCard(cardIdx);
  setStatus(`▶ ${card.hebrew} · ${card.french}`, true);

  await playUrl(hUrl);  if (stopFlag) return;
  await waitMs(1100);   if (stopFlag) return;
  await playUrl(fUrl);  if (stopFlag) return;
  await waitMs(800);    if (stopFlag) return;
  await playUrl(hUrl);  if (stopFlag) return;
  await waitMs(500);
}

// ---- MAIN LOOP ----
async function runLoop() {
  while (!stopFlag) {
    await playCard(queue[qPos]);
    if (stopFlag) break;
    qPos++;
    if (qPos >= queue.length) { resetQueue(); qPos = 0; }
    document.getElementById('prog').style.width = `${(qPos/queue.length)*100}%`;
  }
}

// ---- CONTROLS ----
function doToggle() {
  if (isPlaying) {
    hardStop();
    setStatus('En pause');
  } else {
    startPlaying();
  }
}

function startPlaying() {
  stopFlag = false;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';
  setupMediaSession();
  runLoop();
}

function hardStop() {
  stopFlag = true;
  isPlaying = false;
  player.pause();
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playBtn').classList.remove('loading');
}

function doNext() {
  const wp = isPlaying;
  hardStop();
  qPos = Math.min(qPos+1, queue.length-1);
  showCard(queue[qPos]);
  if (wp) { stopFlag = false; startPlaying(); }
}

function doPrev() {
  const wp = isPlaying;
  hardStop();
  qPos = Math.max(qPos-1, 0);
  showCard(queue[qPos]);
  if (wp) { stopFlag = false; startPlaying(); }
}

function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.setActionHandler('play', () => { if (!isPlaying) startPlaying(); });
  navigator.mediaSession.setActionHandler('pause', () => hardStop());
  navigator.mediaSession.setActionHandler('nexttrack', () => doNext());
  navigator.mediaSession.setActionHandler('previoustrack', () => doPrev());
}

// ---- STATUS ----
function setStatus(msg, ok=false, err=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (ok?' ok':'') + (err?' err':'');
}

// ---- PLAYLIST ----
function buildList(filter='') {
  const c = document.getElementById('playlist');
  c.innerHTML = '';
  const low = filter.toLowerCase();
  CARDS.forEach((card, i) => {
    if (filter && !card.hebrew.includes(filter) && !card.french.toLowerCase().includes(low) && !card.phonetic.toLowerCase().includes(low)) return;
    const pal = PALETTES[i % PALETTES.length];
    const div = document.createElement('div');
    div.className = 'pitem' + (queue[qPos]===i?' active':'');
    div.id = `pi-${i}`;
    div.onclick = () => {
      hardStop();
      const p = queue.indexOf(i);
      qPos = p >= 0 ? p : 0;
      showCard(i);
      stopFlag = false;
      startPlaying();
    };
    div.innerHTML = `
      <div class="pitem-num">${i+1}</div>
      <div class="pitem-dot" style="background:linear-gradient(135deg,${pal[2]},${pal[1]})">${card.hebrew[0]}</div>
      <div class="pitem-info">
        <div class="pitem-heb">${card.hebrew}</div>
        <div class="pitem-fr">${card.french} · ${card.phonetic}</div>
      </div>
    `;
    c.appendChild(div);
  });
}

function filterList(v) { buildList(v); }

// ---- BACKGROUND MUSIC ----
const bgMusic = document.getElementById("bgMusic");
let musicOn = false;
bgMusic.volume = 0.15;

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById("musicBtn");
  const slider = document.getElementById("volSlider");
  if (musicOn) {
    bgMusic.play().catch(() => {});
    btn.style.borderColor = "var(--accent)";
    btn.style.color = "var(--accent)";
    btn.style.background = "#0d2018";
    slider.style.display = "block";
  } else {
    bgMusic.pause();
    btn.style.borderColor = "";
    btn.style.color = "";
    btn.style.background = "";
    slider.style.display = "none";
  }
}

function setVol(val) {
  bgMusic.volume = val / 100;
}
</script>
