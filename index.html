<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>עברית Player</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Serif+Hebrew:wght@300;400;600&display=swap');

:root {
–bg: #0a0a0a;
–surface: #111111;
–surface2: #1a1a1a;
–border: #222222;
–accent: #1DB954;
–accent-dim: #158a3e;
–text: #ffffff;
–muted: #888888;
–muted2: #555555;
–player-h: 160px;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
overflow: hidden;
}

/* API Setup Screen */
#setupScreen {
position: fixed;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 24px;
z-index: 1000;
}

.setup-logo {
font-family: ‘Noto Serif Hebrew’, serif;
font-size: 56px;
color: var(–accent);
margin-bottom: 8px;
animation: fadeIn 0.8s ease;
}

.setup-title {
font-size: 13px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 48px;
animation: fadeIn 1s ease;
}

.setup-card {
width: 100%;
max-width: 400px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 28px;
animation: slideUp 0.6s ease;
}

.setup-label {
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 12px;
}

.setup-input-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
}

.setup-input {
flex: 1;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 13px;
padding: 12px 14px;
outline: none;
transition: border-color 0.2s;
}
.setup-input:focus { border-color: var(–accent); }

.setup-toggle {
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘Syne’, sans-serif;
font-size: 11px;
padding: 12px;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}
.setup-toggle:hover { border-color: var(–accent); color: var(–accent); }

.setup-start {
width: 100%;
background: var(–accent);
border: none;
border-radius: 50px;
color: #000;
font-family: ‘Syne’, sans-serif;
font-size: 14px;
font-weight: 700;
letter-spacing: 1px;
padding: 16px;
cursor: pointer;
transition: all 0.2s;
margin-top: 8px;
}
.setup-start:hover { background: #1ed760; transform: scale(1.02); }

.setup-note {
display: flex;
gap: 8px;
align-items: flex-start;
margin-top: 16px;
padding: 12px;
background: #0d1a11;
border: 1px solid #1a3025;
border-radius: 8px;
}
.setup-note-icon { color: var(–accent); font-size: 13px; flex-shrink: 0; }
.setup-note span { font-size: 11px; color: #6aaa7a; line-height: 1.5; }

.setup-error {
font-size: 12px;
color: #ff6b6b;
margin-top: 10px;
display: none;
}

/* Main App */
#app {
display: none;
flex-direction: column;
height: 100vh;
height: 100dvh;
}

/* Top bar */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px 12px;
flex-shrink: 0;
}

.topbar-logo {
font-family: ‘Noto Serif Hebrew’, serif;
font-size: 24px;
color: var(–accent);
}

.topbar-right {
display: flex;
gap: 12px;
align-items: center;
}

.topbar-count {
font-size: 11px;
color: var(–muted);
letter-spacing: 1px;
}

.shuffle-btn {
background: none;
border: none;
color: var(–muted);
font-size: 18px;
cursor: pointer;
padding: 8px;
border-radius: 50%;
transition: all 0.2s;
display: flex;
align-items: center;
}
.shuffle-btn.active { color: var(–accent); }
.shuffle-btn:hover { color: var(–text); }

/* Now Playing Card */
.now-playing {
padding: 0 20px 16px;
flex-shrink: 0;
}

.artwork {
width: 100%;
aspect-ratio: 1;
max-height: 220px;
border-radius: 12px;
overflow: hidden;
position: relative;
margin-bottom: 16px;
background: var(–surface2);
}

.artwork-canvas {
width: 100%;
height: 100%;
display: block;
}

.artwork-overlay {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
}

.artwork-hebrew {
font-family: ‘Noto Serif Hebrew’, serif;
font-size: clamp(32px, 10vw, 56px);
color: white;
text-shadow: 0 2px 20px rgba(0,0,0,0.8);
direction: rtl;
text-align: center;
line-height: 1.2;
margin-bottom: 8px;
}

.artwork-phonetic {
font-size: clamp(13px, 3.5vw, 16px);
color: rgba(255,255,255,0.7);
text-align: center;
font-weight: 500;
letter-spacing: 1px;
}

.track-info {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 4px;
}

.track-hebrew {
font-family: ‘Noto Serif Hebrew’, serif;
font-size: 22px;
color: var(–text);
direction: rtl;
line-height: 1.2;
}

.track-french {
font-size: 14px;
color: var(–muted);
margin-top: 2px;
}

.track-num {
font-size: 12px;
color: var(–muted2);
white-space: nowrap;
margin-top: 4px;
}

/* Loading indicator */
.loading-bar {
height: 2px;
background: var(–border);
border-radius: 1px;
margin: 12px 0;
overflow: hidden;
}
.loading-bar-fill {
height: 100%;
background: var(–accent);
width: 0%;
transition: width 0.3s;
border-radius: 1px;
}

/* Player Controls */
.controls {
display: flex;
align-items: center;
justify-content: center;
gap: 24px;
padding: 4px 20px 16px;
flex-shrink: 0;
}

.ctrl-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
padding: 8px;
border-radius: 50%;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
}
.ctrl-btn:hover { color: var(–text); transform: scale(1.1); }
.ctrl-btn:active { transform: scale(0.95); }

.play-btn {
width: 64px;
height: 64px;
background: var(–text);
border-radius: 50%;
color: #000;
font-size: 26px;
transition: all 0.15s;
flex-shrink: 0;
}
.play-btn:hover { background: #fff; transform: scale(1.06); color: #000; }
.play-btn.loading { background: var(–accent); color: #000; }

/* Playlist */
.playlist-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 20px 10px;
flex-shrink: 0;
border-top: 1px solid var(–border);
padding-top: 12px;
}

.playlist-title {
font-size: 12px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
}

.playlist-search {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 20px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 12px;
padding: 6px 14px;
outline: none;
width: 120px;
transition: all 0.2s;
}
.playlist-search:focus { border-color: var(–accent); width: 150px; }

.playlist {
flex: 1;
overflow-y: auto;
padding: 0 12px 20px;
-webkit-overflow-scrolling: touch;
}

.playlist::-webkit-scrollbar { width: 3px; }
.playlist::-webkit-scrollbar-track { background: transparent; }
.playlist::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.playlist-item {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 8px;
border-radius: 8px;
cursor: pointer;
transition: background 0.15s;
border-bottom: 1px solid transparent;
}
.playlist-item:hover { background: var(–surface2); }
.playlist-item.active { background: #0d2018; border-color: #1a3528; }

.item-num {
font-size: 12px;
color: var(–muted2);
width: 24px;
text-align: center;
flex-shrink: 0;
}
.playlist-item.active .item-num { color: var(–accent); }

.item-dot {
width: 32px;
height: 32px;
border-radius: 6px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Noto Serif Hebrew’, serif;
font-size: 14px;
color: white;
}

.item-info { flex: 1; min-width: 0; }
.item-hebrew {
font-family: ‘Noto Serif Hebrew’, serif;
font-size: 15px;
color: var(–text);
direction: rtl;
text-align: right;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.playlist-item.active .item-hebrew { color: var(–accent); }
.item-french {
font-size: 12px;
color: var(–muted);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.item-status {
font-size: 16px;
flex-shrink: 0;
width: 20px;
text-align: center;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.spinning { animation: spin 1s linear infinite; }

/* Status message */
.status-msg {
font-size: 11px;
color: var(–muted);
text-align: center;
padding: 4px 20px;
flex-shrink: 0;
min-height: 20px;
}
.status-msg.error { color: #ff6b6b; }
.status-msg.success { color: var(–accent); }
</style>

</head>
<body>

<!-- Setup Screen -->

<div id="setupScreen">
  <div class="setup-logo">עברית</div>
  <div class="setup-title">Hebrew Player</div>
  <div class="setup-card">
    <div class="setup-label">Clé API Google Cloud TTS</div>
    <div class="setup-input-row">
      <input class="setup-input" type="password" id="apiKeyInput" placeholder="AIza...">
      <button class="setup-toggle" onclick="toggleSetupKey()">👁</button>
    </div>
    <div class="setup-note">
      <span class="setup-note-icon">🔒</span>
      <span>Ta clé reste dans ton navigateur. Elle va directement à Google TTS — jamais à un autre serveur.</span>
    </div>
    <div class="setup-error" id="setupError"></div>
    <button class="setup-start" onclick="startApp()">Ouvrir ma playlist →</button>
  </div>
</div>

<!-- Main App -->

<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">עברית</div>
    <div class="topbar-right">
      <span class="topbar-count" id="topbarCount">312 mots</span>
      <button class="shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Aléatoire">⇄</button>
    </div>
  </div>

  <!-- Now Playing -->

  <div class="now-playing">
    <div class="artwork">
      <canvas class="artwork-canvas" id="artworkCanvas"></canvas>
      <div class="artwork-overlay">
        <div class="artwork-hebrew" id="artworkHebrew">—</div>
        <div class="artwork-phonetic" id="artworkPhonetic"></div>
      </div>
    </div>
    <div class="track-info">
      <div>
        <div class="track-hebrew" id="trackHebrew">Sélectionne une carte</div>
        <div class="track-french" id="trackFrench">Hebrew Player</div>
      </div>
      <div class="track-num" id="trackNum"></div>
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
  </div>

  <!-- Controls -->

  <div class="controls">
    <button class="ctrl-btn" onclick="prevCard()" title="Précédent">⏮</button>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="playCurrentCard()">▶</button>
    <button class="ctrl-btn" onclick="nextCard()" title="Suivant">⏭</button>
  </div>

  <!-- Status -->

  <div class="status-msg" id="statusMsg">Appuie sur ▶ pour écouter une carte</div>

  <!-- Playlist -->

  <div class="playlist-header">
    <span class="playlist-title">Playlist · 312 cartes</span>
    <input class="playlist-search" type="text" placeholder="🔍 Chercher..." oninput="filterPlaylist(this.value)">
  </div>
  <div class="playlist" id="playlist"></div>
</div>

// Color palette for artwork
const PALETTES = [
  ['#1a1a2e','#16213e','#0f3460','#533483'],
  ['#2d1b69','#11998e','#38ef7d','#0c3547'],
  ['#0f0c29','#302b63','#24243e','#4776e6'],
  ['#1a0533','#6a0572','#ab00d6','#ff61d2'],
  ['#003d29','#005c4b','#00897b','#1db954'],
  ['#1a0000','#4a0000','#800000','#c0392b'],
  ['#0a0a1a','#1a1a3a','#2a2a6a','#4a4aaa'],
  ['#1a1000','#3a2800','#6a4800','#aa7800'],
];

let API_KEY = '';
let currentIndex = 0;
let shuffleMode = false;
let shuffleOrder = [];
let isPlaying = false;
let isLoading = false;
let currentAudio = null;
let audioQueue = [];

function getCardColor(index) {
  return PALETTES[index % PALETTES.length];
}

function drawArtwork(card, index) {
  const canvas = document.getElementById('artworkCanvas');
  const ctx = canvas.getContext('2d');
  const size = canvas.offsetWidth;
  canvas.width = size;
  canvas.height = size;

  const colors = getCardColor(index);

  // Background gradient
  const grad = ctx.createRadialGradient(size*0.3, size*0.3, 0, size*0.7, size*0.7, size);
  grad.addColorStop(0, colors[2]);
  grad.addColorStop(0.5, colors[1]);
  grad.addColorStop(1, colors[0]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // Decorative circles
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = colors[3];
  ctx.beginPath();
  ctx.arc(size*0.8, size*0.2, size*0.4, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(size*0.1, size*0.9, size*0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i < size; i += size/8) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
  }
}

function updateNowPlaying(card, index) {
  document.getElementById('artworkHebrew').textContent = card.hebrew;
  document.getElementById('artworkPhonetic').textContent = card.phonetic;
  document.getElementById('trackHebrew').textContent = card.hebrew;
  document.getElementById('trackFrench').textContent = card.french;
  document.getElementById('trackNum').textContent = `${index + 1} / 312`;
  drawArtwork(card, index);
}

function toggleSetupKey() {
  const input = document.getElementById('apiKeyInput');
  input.type = input.type === 'password' ? 'text' : 'password';
}

// Auto-load saved key
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('hebrewPlayerApiKey');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
  }
});

function startApp() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || key.length < 10) {
    document.getElementById('setupError').textContent = 'Entre une clé API valide.';
    document.getElementById('setupError').style.display = 'block';
    return;
  }
  API_KEY = key;
  localStorage.setItem('hebrewPlayerApiKey', key);
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildPlaylist();
  selectCard(0);
}

function buildPlaylist(filter = '') {
  const container = document.getElementById('playlist');
  container.innerHTML = '';
  const lower = filter.toLowerCase();

  CARDS.forEach((card, i) => {
    if (filter && !card.hebrew.includes(filter) && !card.french.toLowerCase().includes(lower) && !card.phonetic.toLowerCase().includes(lower)) return;

    const colors = getCardColor(i);
    const item = document.createElement('div');
    item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
    item.id = `item-${i}`;
    item.onclick = () => { selectCard(i); playCurrentCard(); };

    item.innerHTML = `
      <div class="item-num">${i + 1}</div>
      <div class="item-dot" style="background: linear-gradient(135deg, ${colors[2]}, ${colors[1]})">${card.hebrew[0]}</div>
      <div class="item-info">
        <div class="item-hebrew">${card.hebrew}</div>
        <div class="item-french">${card.french} · ${card.phonetic}</div>
      </div>
      <div class="item-status" id="status-${i}"></div>
    `;
    container.appendChild(item);
  });
}

function filterPlaylist(val) {
  buildPlaylist(val);
}

function selectCard(index) {
  // Remove active from old
  const old = document.querySelector('.playlist-item.active');
  if (old) old.classList.remove('active');

  currentIndex = index;
  const card = CARDS[index];
  updateNowPlaying(card, index);

  const item = document.getElementById(`item-${index}`);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffleMode);
  if (shuffleMode) {
    shuffleOrder = [...Array(312).keys()].sort(() => Math.random() - 0.5);
    setStatus('Mode aléatoire activé 🔀', 'success');
  } else {
    setStatus('Mode aléatoire désactivé', '');
  }
}

function nextCard() {
  if (shuffleMode) {
    const pos = shuffleOrder.indexOf(currentIndex);
    const next = shuffleOrder[(pos + 1) % shuffleOrder.length];
    selectCard(next);
  } else {
    selectCard((currentIndex + 1) % CARDS.length);
  }
  if (isPlaying) playCurrentCard();
}

function prevCard() {
  if (shuffleMode) {
    const pos = shuffleOrder.indexOf(currentIndex);
    const prev = shuffleOrder[(pos - 1 + shuffleOrder.length) % shuffleOrder.length];
    selectCard(prev);
  } else {
    selectCard((currentIndex - 1 + CARDS.length) % CARDS.length);
  }
  if (isPlaying) playCurrentCard();
}

function setStatus(msg, type = '') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ` ${type}` : '');
}

function setLoading(val, progress = 0) {
  isLoading = val;
  const btn = document.getElementById('playBtn');
  const bar = document.getElementById('loadingBar');
  bar.style.width = progress + '%';
  if (val) {
    btn.textContent = '⟳';
    btn.classList.add('loading');
  } else {
    btn.classList.remove('loading');
    btn.textContent = isPlaying ? '⏸' : '▶';
    bar.style.width = '0%';
  }
}

async function fetchAudio(text, lang, voice) {
  const res = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      input: { text },
      voice: { languageCode: lang, name: voice },
      audioConfig: { audioEncoding: 'MP3', speakingRate: 0.85 }
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Erreur Google TTS');
  }
  const data = await res.json();
  const binary = atob(data.audioContent);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: 'audio/mp3' });
}

let playSession = 0; // track current play session to cancel stale ones

async function playCurrentCard() {
  if (isLoading) return;

  // Cancel any previous session
  playSession++;
  const mySession = playSession;

  const card = CARDS[currentIndex];

  // Stop current audio
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }

  setLoading(true, 20);
  setStatus(`Chargement de "${card.hebrew}"...`);
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';

  // Media Session API for lock screen
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: card.hebrew,
      artist: card.french,
      album: 'עברית · Hebrew Player',
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => prevCard());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextCard());
    navigator.mediaSession.setActionHandler('pause', () => stopPlayback());
    navigator.mediaSession.setActionHandler('play', () => playCurrentCard());
  }

  try {
    setLoading(true, 40);
    const hebrewBlob = await fetchAudio(card.hebrew, 'he-IL', 'he-IL-Wavenet-A');
    if (playSession !== mySession) return;

    setLoading(true, 70);
    const frenchBlob = await fetchAudio(card.french, 'fr-FR', 'fr-FR-Wavenet-A');
    if (playSession !== mySession) return;

    setLoading(false);
    setStatus(`▶ ${card.hebrew} · ${card.french}`, 'success');

    // Play sequence strictly one after another
    await playBlob(hebrewBlob, mySession);
    if (playSession !== mySession) return;
    await wait(1500);
    if (playSession !== mySession) return;
    await playBlob(frenchBlob, mySession);
    if (playSession !== mySession) return;
    await wait(1000);
    if (playSession !== mySession) return;
    await playBlob(hebrewBlob, mySession);
    if (playSession !== mySession) return;
    await wait(800);
    if (playSession !== mySession) return;

    // Auto-next
    if (isPlaying) {
      setStatus('→ Carte suivante...');
      await wait(400);
      if (playSession !== mySession) return;
      nextCard();
    }

  } catch (err) {
    if (playSession !== mySession) return;
    setLoading(false);
    setStatus('Erreur : ' + err.message, 'error');
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
  }
}

function stopPlayback() {
  playSession++;
  isPlaying = false;
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  setLoading(false);
  document.getElementById('playBtn').textContent = '▶';
  setStatus('En pause');
}

function playBlob(blob, session) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    audio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
    audio.play().catch(() => resolve());
  });
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
